name: Weekly Hazy Chanel Analytics

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9:00 UTC
  workflow_dispatch:

jobs:
  update-feedback-loop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Recreate Auth Tokens
        run: |
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token_youtube.json

      - name: Create Environment Variables
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env
          echo "WEBHOOK_INSIGHTS=${{ secrets.WEBHOOK_INSIGHTS || secrets.DISCORD_WEBHOOK_URL }}" >> .env
          echo "WEBHOOK_ERRORS=${{ secrets.WEBHOOK_ERRORS || secrets.DISCORD_WEBHOOK_URL }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "FUNCTION_NAME=${{ secrets.FUNCTION_NAME }}" >> .env
          echo "GITHUB_ACTIONS=true" >> .env

      - name: Install Dependencies and Sync
        run: |
          pip install -r requirements.txt
          python run_analytics.py
