name: Daily Hazy Chanel Factory

on:
  schedule:
    - cron: '0 11 * * *'   # 7 AM ET — US morning
    - cron: '0 23 * * *'   # 7 PM ET — US prime time
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-


      - name: Recreate Auth Tokens
        env:
          DRIVE_TOKEN:    ${{ secrets.DRIVE_TOKEN_JSON }}
          YOUTUBE_TOKEN:  ${{ secrets.YOUTUBE_TOKEN_JSON }}
          CLIENT_SECRETS: ${{ secrets.CLIENT_SECRETS_JSON }}
          IG_SESSION:     ${{ secrets.IG_SESSION_JSON }}
        run: |
          echo "$DRIVE_TOKEN"    > token_drive.json
          echo "$YOUTUBE_TOKEN"  > token_youtube.json
          echo "$CLIENT_SECRETS" > client_secrets.json
          if [ -n "$IG_SESSION" ]; then
            echo "$IG_SESSION" > ig_session.json
          fi

      - name: Create .env File
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env
          echo "ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}" >> .env
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> .env
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
          echo "BUCKET_NAME=${{ secrets.BUCKET_NAME }}" >> .env
          echo "SERVE_URL=${{ secrets.SERVE_URL }}" >> .env
          echo "ROBLOX_FOLDER_ID=${{ secrets.ROBLOX_FOLDER_ID }}" >> .env
          echo "PARKOUR_FOLDER_ID=${{ secrets.PARKOUR_FOLDER_ID }}" >> .env
          echo "SFX_FOLDER_ID=${{ secrets.SFX_FOLDER_ID }}" >> .env
          echo "GAMING_BGM_FOLDER_ID=${{ secrets.GAMING_BGM_FOLDER_ID }}" >> .env
          echo "GENERAL_BGM_FOLDER_ID=${{ secrets.GENERAL_BGM_FOLDER_ID }}" >> .env
          echo "WEBHOOK_LOGS=${{ secrets.WEBHOOK_LOGS || secrets.DISCORD_WEBHOOK_URL }}" >> .env
          echo "WEBHOOK_ERRORS=${{ secrets.WEBHOOK_ERRORS || secrets.DISCORD_WEBHOOK_URL }}" >> .env
          echo "WEBHOOK_POSTS=${{ secrets.WEBHOOK_POSTS || secrets.DISCORD_WEBHOOK_URL }}" >> .env
          echo "WEBHOOK_INSIGHTS=${{ secrets.WEBHOOK_INSIGHTS || secrets.DISCORD_WEBHOOK_URL }}" >> .env
          echo "TIKTOK_COOKIES_JSON=${{ secrets.TIKTOK_COOKIES_JSON }}" >> .env
          echo "TIKTOK_COOKIES_TXT=${{ secrets.TIKTOK_COOKIES_TXT }}" >> .env
          echo "FUNCTION_NAME=${{ secrets.FUNCTION_NAME }}" >> .env
          echo "GITHUB_ACTIONS=true" >> .env

      - name: Verify Critical Secrets
        run: |
          python -m pip install python-dotenv
          python -c 'import os; from dotenv import load_dotenv; load_dotenv(); critical = ["GEMINI_API_KEY", "SUPABASE_URL", "AWS_ACCESS_KEY_ID", "BUCKET_NAME", "SERVE_URL", "PARKOUR_FOLDER_ID", "FUNCTION_NAME"]; missing = [k for k, v in {k: os.getenv(k) for k in critical}.items() if not v]; exit(f"::error::Missing critical secrets: {missing}") if missing else print("All critical secrets found.")'

      - name: Install Python Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install System Deps
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run Factory
        run: python run_factory.py