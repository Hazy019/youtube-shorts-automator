name: Daily Hazy Chanel Factory

on:
  schedule:
    - cron: '0 11 * * *'   # 7 AM ET — US morning
    - cron: '0 23 * * *'   # 7 PM ET — US prime time
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Cache Playwright Firefox
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-firefox-${{ hashFiles('requirements.txt') }}
          restore-keys: playwright-firefox-

      - name: Recreate Auth Tokens
        env:
          DRIVE_TOKEN:    ${{ secrets.DRIVE_TOKEN_JSON }}
          YOUTUBE_TOKEN:  ${{ secrets.YOUTUBE_TOKEN_JSON }}
          CLIENT_SECRETS: ${{ secrets.CLIENT_SECRETS_JSON }}
          IG_SESSION:     ${{ secrets.IG_SESSION_JSON }}
        run: |
          echo "$DRIVE_TOKEN"    > token_drive.json
          echo "$YOUTUBE_TOKEN"  > token_youtube.json
          echo "$CLIENT_SECRETS" > client_secrets.json
          if [ -n "$IG_SESSION" ]; then
            echo "$IG_SESSION" > ig_session.json
          fi

      - name: Install Python Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright & System Deps
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          python -m playwright install firefox --with-deps

      - name: Run Factory
        env:
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL:           ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:           ${{ secrets.SUPABASE_KEY }}
          ELEVENLABS_API_KEY:     ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY:         ${{ secrets.PEXELS_API_KEY }}
          AWS_ACCESS_KEY_ID:      ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:  ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          WEBHOOK_LOGS:           ${{ secrets.WEBHOOK_LOGS || secrets.DISCORD_WEBHOOK_URL }}
          WEBHOOK_ERRORS:         ${{ secrets.WEBHOOK_ERRORS || secrets.DISCORD_WEBHOOK_URL }}
          WEBHOOK_POSTS:          ${{ secrets.WEBHOOK_POSTS || secrets.DISCORD_WEBHOOK_URL }}
          WEBHOOK_INSIGHTS:       ${{ secrets.WEBHOOK_INSIGHTS || secrets.DISCORD_WEBHOOK_URL }}
          BUCKET_NAME:            ${{ secrets.BUCKET_NAME }}
          SERVE_URL:              ${{ secrets.SERVE_URL }}
          ROBLOX_FOLDER_ID:       ${{ secrets.ROBLOX_FOLDER_ID }}
          PARKOUR_FOLDER_ID:      ${{ secrets.PARKOUR_FOLDER_ID }}
          SFX_FOLDER_ID:          ${{ secrets.SFX_FOLDER_ID }}
          GAMING_BGM_FOLDER_ID:   ${{ secrets.GAMING_BGM_FOLDER_ID }}
          GENERAL_BGM_FOLDER_ID:  ${{ secrets.GENERAL_BGM_FOLDER_ID }}
          TIKTOK_COOKIES_JSON:    ${{ secrets.TIKTOK_COOKIES_JSON }}
          TIKTOK_COOKIES_TXT:     ${{ secrets.TIKTOK_COOKIES_TXT }}
          GITHUB_ACTIONS:         "true"
        run: python orchestrator.py