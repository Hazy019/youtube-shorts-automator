name: Daily Hazy Chanel Factory

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Recreate Auth Tokens
        env:
          DRIVE_TOKEN: ${{ secrets.DRIVE_TOKEN_JSON }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          CLIENT_SECRETS: ${{ secrets.CLIENT_SECRETS_JSON }}
        run: |
          echo "$DRIVE_TOKEN" > token_drive.json
          echo "$YOUTUBE_TOKEN" > token_youtube.json
          echo "$CLIENT_SECRETS" > client_secrets.json

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2 libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxrandr2 libgbm1 libpango-1.0-0 libcairo2

      - name: Install Python Requirements and Playwright
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Factory
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
          SERVE_URL: ${{ secrets.SERVE_URL }}
          ROBLOX_FOLDER_ID: ${{ secrets.ROBLOX_FOLDER_ID }}
          PARKOUR_FOLDER_ID: ${{ secrets.PARKOUR_FOLDER_ID }}
          SFX_FOLDER_ID: ${{ secrets.SFX_FOLDER_ID }}
          BGM_FOLDER_ID: ${{ secrets.BGM_FOLDER_ID }}
          TIKTOK_COOKIES_JSON: ${{ secrets.TIKTOK_COOKIES_JSON }}
          GITHUB_ACTIONS: "true"
        run: python orchestrator.py